# Infrastructure Services Stack
# Provides core networking, security and monitoring services for the home lab environment
# Note: Docker Compose specification version is automatically detected by Docker

x-common-settings: &common-settings  # YAML anchor for shared configuration settings
  restart: unless-stopped            # Always restart containers unless manually stopped
  logging:                          # Standardized logging configuration
    driver: "json-file"            # Use JSON file logging for better structured logs
    options:                       # Configure log rotation to prevent disk space issues
      max-size: "10m"             # Rotate logs when they reach 10MB
      max-file: "3"               # Keep only last 3 log files

services:
  ### NETWORK SERVICES ###
  pihole:  # DNS and network-wide ad blocking service
    <<: *common-settings           # Include common settings defined above
    image: pihole/pihole:latest    # Official Pi-hole image, latest version
    container_name: pihole         # Explicit container name for easier management
    hostname: pihole               # Set container hostname for DNS resolution
    environment:                   # Container environment configuration
      TZ: ${TZ}                   # Timezone from .env file
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}  # Admin interface password
      FTLCONF_LOCAL_IPV4: ${PIHOLE_IP4_ADDR}  # Pi-hole's IP address on the network
      VIRTUAL_HOST: pihole.${DOMAIN}  # Hostname for web interface access
    volumes:                      # Persistent storage configuration
      - ${CONFIG_PATH}/pihole/etc-pihole:/etc/pihole:rw         # Pi-hole config files
      - ${CONFIG_PATH}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d:rw   # DNS configuration
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    networks: 
      home-macvlan:
        ipv4_address: ${PIHOLE_IP4_ADDR}
    dns:
      - 127.0.0.1
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 10s
      retries: 3

  traefik:  # Reverse proxy and SSL termination service
    <<: *common-settings
    image: traefik:v2.10          # Latest v2 stable release of Traefik
    container_name: traefik
    security_opt:                 # Enhanced security settings
      - no-new-privileges:true    # Prevent privilege escalation
    command:                      # Traefik configuration via CLI arguments
      # API and Dashboard configuration
      - "--api.dashboard=true"    # Enable web UI
      - "--api.insecure=false"    # Disable insecure API access
      # Docker provider configuration
      - "--providers.docker=true"  # Enable Docker as configuration provider
      - "--providers.docker.exposedbydefault=false"  # Don't expose containers by default
      - "--providers.docker.network=my-network"      # Default network for backend services
      # Entrypoints configuration
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt configuration
      - "--certificatesresolvers.myresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.myresolver.acme.email=${CF_API_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/acme.json"
      # Log configuration
      - "--log.level=INFO"
      - "--accesslog=true"
      # File provider for dynamic configuration
      - "--providers.file.filename=/dynamic.yml"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    labels:
      - "traefik.enable=true" # Enable Traefik for this container
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)" # Router rule to match the host
      - "traefik.http.routers.traefik.entrypoints=websecure" # Use the websecure entrypoint
      - "traefik.http.routers.traefik.tls.certresolver=myresolver" # Use the defined certificate resolver
      - "traefik.http.routers.traefik.service=api@internal" # Use the internal Traefik API service
      - "traefik.http.routers.traefik.tls=true" # Enable TLS
      - "traefik.http.routers.traefik.tls.domains[0].main=${DOMAIN}" # Define the main domain for TLS
      - "traefik.http.routers.traefik.tls.domains[0].sans=*.${DOMAIN}" # Define a wildcard subdomain for TLS
      - "traefik.http.routers.traefik.middlewares=rateLimitMiddleware@file,authelia@file"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"  # Create a middleware named 'redirect-to-https' for HTTP to HTTPS redirection
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"  # Set the redirect as permanent (HTTP 301)
      - "traefik.http.services.traefik-servarrdock.loadbalancer.server.port=8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CONFIG_PATH}/traefik/acme.json:/acme.json:rw
      - ${CONFIG_PATH}/traefik/dynamic.yml:/dynamic.yml:ro
      - ${CONFIG_PATH}/traefik/logs:/logs:rw
    networks: 
      my-network:
      home-macvlan:
        ipv4_address: ${NET_IP4_TRAEFIK}
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  ### MAINTENANCE SERVICES ###
  watchtower:  # Automatic container update service
    <<: *common-settings
    image: containrrr/watchtower:latest
    container_name: watchtower
    security_opt:
      - no-new-privileges:true    # Prevent privilege escalation
    environment:
      - TZ=${TZ}                 # Timezone configuration
      - WATCHTOWER_CLEANUP=true  # Remove old images after updates
      - WATCHTOWER_POLL_INTERVAL=86400  # Check for updates daily
      - WATCHTOWER_NOTIFICATION_REPORT_SUCCESS=false  # Only notify on failures
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - my-network

  ### AUTHENTICATION SERVICES ###
  authelia:  # Single sign-on and 2FA service
    <<: *common-settings
    image: authelia/authelia:latest
    container_name: authelia
    security_opt:
      - no-new-privileges:true    # Prevent privilege escalation
    environment:
      - TZ=${TZ}                 # Timezone configuration
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}        # Secret for JWT token signing
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET} # Secret for session encryption
    volumes:
      - ${CONFIG_PATH}/authelia:/config:rw
    networks:
      - my-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true" # Enable Traefik for this container, it makes the Authelia service discoverable by Traefik
      - "traefik.http.routers.authelia.rule=Host(`auth.home.carr-it.net`)" # Router rule that matches the domain name of the Authelia service
      - "traefik.http.routers.authelia.entrypoints=websecure" # Defines the entrypoint for this router, it should be the HTTPS entrypoint
      - "traefik.http.routers.authelia.tls.certresolver=myresolver" # This tells Traefik to use the previously defined certificate resolver for this service
      - "traefik.http.services.authelia.loadbalancer.server.port=9091" # Authelia's internal port that needs to be exposed to the network
      - "traefik.http.routers.authelia.middlewares=rateLimitMiddleware@file"

networks:
  home-macvlan:  # External network for LAN-accessible services
    driver: macvlan              # Use macvlan for direct network access
    driver_opts:
      parent: ${NET_NIC_NAME}    # Physical network interface to attach to
    ipam:                        # IP address management configuration
      config:
        - subnet: ${NET_IP4_NWADDR}   # Network subnet from .env
          gateway: ${NET_IP4_DEFGW}    # Network gateway from .env
  
  my-network:  # Internal network for service interconnection
    driver: bridge               # Standard bridge network for container communication
    ipam:
      driver: default            # Use default IPAM driver
      config:
        - subnet: 172.16.0.0/24  # Dedicated subnet for internal services